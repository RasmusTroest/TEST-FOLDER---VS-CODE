<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #f5f7fa, #c3cfe2);
        }

        container {
            color: #1f2933;
            display: block;
            text-align: left;
            padding-bottom: 1.5rem;
        }

        #inputbox {
            color: #1f2933;
        }


        .card {
            text-align: center;
            padding: 2.5rem 3rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 1rem 3rem rgba(31, 41, 55, 0.15);
            backdrop-filter: blur(6px);
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 2rem;
            color: #1f2933;
        }

        #count {
            color: darkgrey;
        }

        .dice {
            display: inline-grid;
            place-items: center;
            width: 6rem;
            height: 6rem;
            margin: 0 auto 1.5rem;
            border-radius: 1.25rem;
            background: linear-gradient(145deg, #ffffff, #d4d8dd);
            box-shadow: inset 0.3rem 0.3rem 0.8rem rgba(31, 41, 55, 0.2),
                inset -0.3rem -0.3rem 0.8rem rgba(255, 255, 255, 0.7);
            font-size: 2.5rem;
            font-weight: 700;
            color: #1f2933;
            transition: transform 150ms ease-in-out;
        }

        .dice.roll {
            animation: wiggle 400ms ease;
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(12deg);
            }

            75% {
                transform: rotate(-12deg);
            }
        }

        button {
            padding: 0.9rem 1.75rem;
            width: 250px;
            border-radius: 999px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease;
            box-shadow: 0 0.6rem 1.2rem rgba(37, 99, 235, 0.4);
        }

        #fjernAlle {
            background: linear-gradient(135deg, #ef1404, #c15353);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.8rem 1.6rem rgba(37, 99, 235, 0.45);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 0.4rem 0.8rem rgba(37, 99, 235, 0.35);
        }

        input {
            background-color: white;
            border-radius: 15px;
            height: 40px;
            width: 100%;
            color: #1f2933;
        }

        li {
            display: flex;
            color: #1f2933;
            justify-content: space-between;
            margin: 20px;
            align-items: center;
        }

        .itemRemoveButton {
            width: fit-content;
            align-content: center;
            margin-left: 40px;
            background: linear-gradient(135deg, #ef1404, #c15353);
        }
    </style>
</head>

<body>
    <main class="card">
        <header>
            <h1>Indkøbsliste</h1>
            <p id="count">Ingen ting på listen</p>
        </header>
        <container id="inputBox">
            <p>Indkøbsliste</p>
            <input id="textinput" type="text" placeholder="Tilføj en ting">
        </container>
        <div id="buttons">
            <button type="submit" id="tilføj">Tilføj</button>
            <button id="fjernAlle">Fjern Alle</button>
        </div>
        <ul id="list">
        </ul>
    </main>
    <script>
        const list = document.querySelector("#list");
        const add_btn = document.querySelector("#tilføj");
        const rem_btn = document.querySelector("#fjernAlle")
        const item = document.getElementById("textinput");
        let index = 0;

        function addItem() {
            if (item.value != "") {
                let li = document.createElement("li");

                let text = document.createElement("span");
                text.innerText = item.value;

                let item_btn = document.createElement("button");
                item_btn.setAttribute("class", "itemRemoveButton");
                item_btn.innerText = "Fjern";

                li.appendChild(text);
                li.appendChild(item_btn);

                index++;
                li.setAttribute("id", index);
                item.value = "";
                list.appendChild(li);
            }
        }

        function removeAll() {
            while (list.children.length > 0) {
                list.removeChild(list.lastChild);
            }
        }

        function updateCount() {
            if (index > 0) {
                document.getElementById("count").style.display = "none";
            } else {
                document.getElementById("count").style.display = "block";
            }
        }
        document.addEventListener("click", updateCount)
        add_btn.addEventListener("click", addItem);
        rem_btn.addEventListener("click", removeAll)
        list.addEventListener("click", (e) => {
            if (e.target.classList.contains("itemRemoveButton")) {
                const li = e.target.closest("li");
                li?.remove();
            }
        });
    </script>
</body>

</html>
