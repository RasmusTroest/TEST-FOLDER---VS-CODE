<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #f5f7fa, #c3cfe2);
        }

        .card {
            text-align: center;
            padding: 2.5rem 3rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 1rem 3rem rgba(31, 41, 55, 0.15);
            backdrop-filter: blur(6px);
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 2rem;
            color: #1f2933;
        }

        .dice {
            display: inline-grid;
            place-items: center;
            width: 6rem;
            height: 6rem;
            margin: 0 auto 1.5rem;
            border-radius: 1.25rem;
            background: linear-gradient(145deg, #ffffff, #d4d8dd);
            box-shadow: inset 0.3rem 0.3rem 0.8rem rgba(31, 41, 55, 0.2),
                inset -0.3rem -0.3rem 0.8rem rgba(255, 255, 255, 0.7);
            font-size: 2.5rem;
            font-weight: 700;
            color: #1f2933;
            transition: transform 150ms ease-in-out;
        }

        .dice.roll {
            animation: wiggle 400ms ease;
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(12deg);
            }

            75% {
                transform: rotate(-12deg);
            }
        }

        button {
            padding: 0.9rem 1.75rem;
            border-radius: 999px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease;
            box-shadow: 0 0.6rem 1.2rem rgba(37, 99, 235, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.8rem 1.6rem rgba(37, 99, 235, 0.45);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 0.4rem 0.8rem rgba(37, 99, 235, 0.35);
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Roll the dice</h1>
        <div id="dice" class="dice">
            1
        </div>
        <button type="button" id="rollButton">
            Roll Dice
        </button>
    </main>
    <script>
        const btn = document.querySelector("#rollButton");
        const element = document.getElementById("dice");

        function rollDice() {
            const roll = Math.ceil(Math.random() * 6);
            element.innerHTML = roll;
        }

        btn.addEventListener("click", rollDice);

    </script>
</body>

</html>
